name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend API
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://hallow-backend.onrender.com/api/
          echo "Pinged successfully"
